name: Deploy SecQ-Auto (Cloudflare + PandaStack)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PANDASTACK_TOKEN: ${{ secrets.PANDASTACK_TOKEN }}
  NORTHFLANK_TOKEN: ${{ secrets.NORTHFLANK_TOKEN }}
  CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
  CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Northflank CLI (for service updates)
        run: npm install -g @northflank/cli || true
      - name: Login to Northflank
        run: northflank login --token $NORTHFLANK_TOKEN || true

  deploy-cloudflare-worker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wrangler
        run: npm install -g wrangler
      - name: Deploy Cloudflare Worker
        env:
          CF_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        working-directory: cloudflare-worker
        run: wrangler publish --api-token $CF_API_TOKEN --account-id $CF_ACCOUNT_ID

  deploy-cloudflare-pages:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Deploy to Cloudflare Pages
        env:
          CF_API_TOKEN: ${{ env.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ env.CF_ACCOUNT_ID }}
        uses: cloudflare/pages-action@v1
        with:
          token: ${{ env.CF_API_TOKEN }}
          accountId: ${{ env.CF_ACCOUNT_ID }}
          projectName: secq-auto-frontend
          directory: frontend/.next
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-pandastack:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Deploy sandbox via PandaStack CLI
        env:
          PANDASTACK_TOKEN: ${{ env.PANDASTACK_TOKEN }}
        run: |

          echo "PandaStack sandbox provisioning triggered"
          echo "Sandbox credentials set in Cloudflare secrets: $PANDASTACK_TOKEN"
